name: Validate Submission

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          json: "true"

      - name: Validate submission
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login.toLowerCase();
            const changedFiles = ${{ steps.changed.outputs.all_changed_files }};

            const errors = [];

            const allowedFiles = [];
            for (const file of changedFiles) {
              if (file === '_index.json') {
                errors.push(`❌ You cannot modify _index.json — it is auto-generated.`);
                continue;
              }
              if (file.startsWith('.github/')) {
                errors.push(`❌ You cannot modify workflow files: ${file}`);
                continue;
              }
              if (file === 'README.md' || file === 'LICENSE') {
                errors.push(`❌ You cannot modify ${file}.`);
                continue;
              }
              if (!file.endsWith('.json')) {
                errors.push(`❌ Only .json files are allowed: ${file}`);
                continue;
              }
              if (file.includes('/')) {
                errors.push(`❌ Files must be in the root directory, not in subdirectories: ${file}`);
                continue;
              }

              const prefix = file.split('__')[0].toLowerCase();
              if (prefix !== prAuthor) {
                errors.push(`❌ Filename "${file}" does not start with your username "${prAuthor}__". You can only manage your own packages.`);
                continue;
              }

              allowedFiles.push(file);
            }

            const fs = require('fs');
            const REQUIRED_FIELDS = ['name', 'repo', 'description', 'tags'];
            const NAME_PATTERN = /^[a-z0-9][a-z0-9\-]*$/;
            const REPO_PATTERN = /^[a-zA-Z0-9\-_.]+\/[a-zA-Z0-9\-_.]+$/;

            for (const file of allowedFiles) {
              let content;
              try {
                content = JSON.parse(fs.readFileSync(file, 'utf8'));
              } catch (e) {
                errors.push(`❌ ${file}: Invalid JSON — ${e.message}`);
                continue;
              }

              for (const field of REQUIRED_FIELDS) {
                if (!content[field]) {
                  errors.push(`❌ ${file}: Missing required field "${field}".`);
                }
              }

              if (content.name && !NAME_PATTERN.test(content.name)) {
                errors.push(`❌ ${file}: "name" must be lowercase alphanumeric with hyphens only.`);
              }

              if (content.repo && !REPO_PATTERN.test(content.repo)) {
                errors.push(`❌ ${file}: "repo" must be in format "username/repo-name".`);
              }

              if (content.tags && !Array.isArray(content.tags)) {
                errors.push(`❌ ${file}: "tags" must be an array.`);
              }

              if (content.tags && content.tags.length > 10) {
                errors.push(`❌ ${file}: Maximum 10 tags allowed.`);
              }

              if (content.description && content.description.length > 200) {
                errors.push(`❌ ${file}: "description" must be 200 characters or less.`);
              }

              const expectedPrefix = file.split('__')[0].toLowerCase();
              if (content.repo) {
                const repoOwner = content.repo.split('/')[0].toLowerCase();
                if (repoOwner !== expectedPrefix) {
                  errors.push(`❌ ${file}: "repo" owner "${repoOwner}" doesn't match your username "${expectedPrefix}".`);
                }
              }
            }

            // Check remote repos for valid tarshub.json
            for (const file of allowedFiles) {
              let content;
              try {
                content = JSON.parse(fs.readFileSync(file, 'utf8'));
              } catch {
                continue;
              }
              if (!content.repo) continue;

              try {
                const response = await fetch(
                  `https://raw.githubusercontent.com/${content.repo}/main/tarshub.json`
                );
                if (!response.ok) {
                  const responseFallback = await fetch(
                    `https://raw.githubusercontent.com/${content.repo}/master/tarshub.json`
                  );
                  if (!responseFallback.ok) {
                    errors.push(`❌ ${file}: Could not find tarshub.json in repo "${content.repo}". Make sure the repo is public and has a tarshub.json on the main/master branch.`);
                    continue;
                  }
                }

                const tarshub = await (response.ok ? response : responseFallback).json();

                if (!tarshub.name || !tarshub.files || !Array.isArray(tarshub.files)) {
                  errors.push(`❌ ${file}: tarshub.json in "${content.repo}" is missing required fields (name, files).`);
                  continue;
                }

                const ALLOWED_EXTENSIONS = ['.md', '.mdc', '.txt', '.json', '.yaml', '.yml', '.toml'];
                for (const f of tarshub.files) {
                  const ext = '.' + f.split('.').pop().toLowerCase();
                  if (!ALLOWED_EXTENSIONS.includes(ext)) {
                    errors.push(`❌ ${file}: tarshub.json lists file "${f}" with disallowed extension. Allowed: ${ALLOWED_EXTENSIONS.join(', ')}`);
                  }
                }

                if (tarshub.files.length > 50) {
                  errors.push(`❌ ${file}: tarshub.json lists ${tarshub.files.length} files. Maximum is 50.`);
                }
              } catch (e) {
                errors.push(`⚠️ ${file}: Could not validate remote repo "${content.repo}" — ${e.message}`);
              }
            }

            if (errors.length > 0) {
              const body = `## ❌ Validation Failed\n\n${errors.join('\n')}\n\nPlease fix the issues above and push again.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
              core.setFailed('Validation failed');
            } else {
              const body = `## ✅ Validation Passed\n\nAll checks passed. This PR will be auto-merged shortly.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

      - name: Auto-approve
        if: success()
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge
        if: success()
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: ""

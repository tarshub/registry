name: Build Index

on:
  push:
    branches: [main]
    paths-ignore:
      - '_index.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build _index.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const pkgDir = 'packages';
            if (!fs.existsSync(pkgDir)) {
              console.log('No packages/ directory found. Writing empty index.');
              fs.writeFileSync('_index.json', JSON.stringify({ updated: new Date().toISOString(), packages: [] }, null, 2) + '\n');
              return;
            }

            const packages = [];

            function walkDir(dir, relativeBase) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const ent of entries) {
                const fullPath = path.join(dir, ent.name);
                if (ent.isDirectory()) {
                  walkDir(fullPath, relativeBase);
                } else if (ent.isFile() && ent.name === 'tarshub.json') {
                  let entry;
                  try {
                    entry = JSON.parse(fs.readFileSync(fullPath, 'utf8'));
                  } catch (e) {
                    console.warn(`Skipping ${fullPath}: invalid JSON`);
                    continue;
                  }

                  if (!entry.repo || !entry.name) {
                    console.warn(`Skipping ${fullPath}: missing repo or name`);
                    continue;
                  }

                  const relativePath = path.relative(relativeBase, fullPath);
                  let id = relativePath.replace(/\\/g, '/');
                  if (!id.endsWith('tarshub.json')) {
                    console.warn(`Skipping ${fullPath}: expected tarshub.json leaf`);
                    continue;
                  }
                  id = id.slice(0, -'tarshub.json'.length).replace(/\/$/, '');
                  if (!id) {
                    console.warn(`Skipping ${fullPath}: invalid path (id empty)`);
                    continue;
                  }
                  const author = id.split('/')[0];
                  const keywords = (entry.keywords || []).map(k => k.toLowerCase());
                  const version = entry.version || '1.0.0';
                  const fileCount = Array.isArray(entry.files) ? entry.files.length : 0;

                  packages.push({
                    id,
                    name: entry.name,
                    author,
                    avatar: `https://avatars.githubusercontent.com/${author}`,
                    repo: entry.repo,
                    subpath: entry.subpath || '',
                    description: entry.description || '',
                    keywords,
                    files: fileCount,
                    version
                  });
                }
              }
            }

            walkDir(pkgDir, pkgDir);
            packages.sort((a, b) => a.id.localeCompare(b.id));

            const index = {
              updated: new Date().toISOString(),
              packages
            };

            fs.writeFileSync('_index.json', JSON.stringify(index, null, 2) + '\n');
            console.log(`Built _index.json with ${packages.length} packages`);

      - name: Commit and push
        run: |
          git config user.name "tarshub-bot"
          git config user.email "bot@tarshub.com"
          git add _index.json
          git diff --staged --quiet && echo "No changes to _index.json" && exit 0
          git commit -m "rebuild _index.json"
          git push
